name: Build myPieIDE
on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          sudo apt update
          sudo apt install -y python3-pip build-essential git python3-setuptools libffi-dev libssl-dev

      - name: Build with Buildozer
        uses: GearSnd/buildozer-action@v1
        with:
          workdir: .
          buildozer_version: stable

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: myPieIDE-debug-APK
          path: bin/*.apk

