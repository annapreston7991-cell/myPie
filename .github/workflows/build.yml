name: Build myPieIDE
on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-22.04  # Using a specific, stable Ubuntu version

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install System Dependencies
        run: |
          sudo apt update
          sudo apt install -y build-essential git ffmpeg libgstreamer1.0-dev \
          pkg-config libavformat-dev libavcodec-dev libswscale-dev \
          libavdevice-dev libavfilter-dev libswresample-dev \
          python3-setuptools libffi-dev libssl-dev autoconf automake libtool \
          openjdk-17-jdk unzip zip
          pip install --upgrade pip
          pip install buildozer cython==0.29.33

      - name: Build with Buildozer
        run: |
          yes | buildozer android debug
        env:
          BUILDOZER_ALLOW_ORG_NAME_START: 1

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: myPieIDE-debug-APK
          path: bin/*.apk

